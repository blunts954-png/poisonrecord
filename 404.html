  <link rel="stylesheet" href="styles.css">

  <style>
    .notfound-content {
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: radial-gradient(circle at center, rgba(139, 0, 0, 0.1) 0%, transparent 70%);
    }
    .glitch-text {
      font-size: clamp(6rem, 20vw, 15rem);
      font-family: 'Bebas Neue', sans-serif;
      margin: 0;
      line-height: 0.8;
      color: var(--accent);
      text-shadow: 2px 2px #ff0000, -2px -2px #00ff00;
      animation: glitch 1s infinite;
      position: relative;
    }
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }
    .notfound-h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      margin-bottom: 1rem;
      letter-spacing: 2px;
    }
    .notfound-p {
      max-width: 500px;
      margin-bottom: 3rem;
      opacity: 0.7;
      font-size: 1.2rem;
    }
    .static-noise {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://www.transparenttextures.com/patterns/p6.png');
      opacity: 0.05;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
