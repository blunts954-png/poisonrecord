backend:
  name: git-gateway
  branch: main

media_folder: "/"
public_folder: "/"

collections:
  - name: "products"
    label: "Vinyl/Store Catalog"
    folder: "_data/products"
    create: true
    slug: "{{id}}"
    extension: "json"
    format: "json"
    fields:
      - {label: "System ID (Must match Stripe key)", name: "id", widget: "string"}
      - {label: "Album Name", name: "name", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Price in Cents (e.g. 2500 = $25)", name: "unitAmount", widget: "number"}
      - {label: "Image Upload", name: "imagePath", widget: "image"}
      - {label: "Section", name: "inventoryType", widget: "select", options: ["vinyl", "rarity", "test-pressing"]}
      - {label: "Max Quantity Per Order", name: "maxQuantity", widget: "number", default: 6}
