<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin | Poison Well Records</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #141414;
      --text: #f5f1eb;
      --muted: #b9ab98;
      --accent: #f06822;
      --line: #2c241d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
      background:
        radial-gradient(circle at top, rgba(240, 104, 34, 0.18), transparent 32%),
        linear-gradient(180deg, #120b07, #050505 60%);
      color: var(--text);
      font-family: Georgia, "Times New Roman", serif;
    }

    .card {
      width: min(100%, 720px);
      padding: 2.5rem;
      border: 1px solid var(--line);
      background: rgba(20, 20, 20, 0.94);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }

    h1 {
      margin: 0 0 1rem;
      font-size: clamp(2rem, 5vw, 3.2rem);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--accent);
    }

    p {
      margin: 0 0 1rem;
      line-height: 1.6;
    }

    .muted {
      color: var(--muted);
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Admin Is Offline</h1>
    <p>
      The old admin and CMS flow is not enabled on this deployment.
    </p>
    <p class="muted">
      Content updates should be handled through the codebase and Netlify deployment workflow until a replacement
      admin setup is chosen.
    </p>
    <p>
      For access requests or content edits, email
      <a href="mailto:poisonwellrecords@gmail.com">poisonwellrecords@gmail.com</a>.
    </p>
  </main>
</body>
</html>
